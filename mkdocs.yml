site_name: AI Knowledge Graph
site_description: AI computing knowledge base for people and AI agents
site_url: https://amoursec.github.io/aikg/
repo_url: https://github.com/AmourSec/aikg
repo_name: AmourSec/aikg
theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: blue
plugins:
  - search:
      lang:
        - en
        - zh
  - mermaid2:
      javascript: assets/javascripts/mermaid.min.js
      arguments:
        startOnLoad: true
        securityLevel: loose
        flowchart:
          useMaxWidth: true
          htmlLabels: true
          nodeSpacing: 28
          rankSpacing: 42
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - 首页: index.md
  - 知识地图: knowledge-map.md
  - AI 基础理论:
      - 01-ai-basics/index.md
  - 模型与任务:
      - 02-models-and-tasks/index.md
  - 数据与数据工程:
      - 03-data-engineering/index.md
  - 训练、微调与对齐:
      - 04-training-finetuning-alignment/index.md
  - 推理与应用构建:
      - 05-inference-apps/index.md
  - Prompt、RAG 与 Agents:
      - 06-prompt-rag-agents/index.md
  - AI 软件栈:
      - 07-ai-software-stack/index.md
  - AI 计算与基础设施:
      - 08-ai-compute-infra/index.md
  - 系统、集群与 MLOps:
      - 09-systems-mlops/index.md
  - 评测、Benchmark 与优化:
      - 10-evaluation-benchmark-optimization/index.md
  - 安全、治理与 Responsible AI:
      - 11-safety-governance/index.md
  - 架构案例、ADR 与故障复盘:
      - 12-architecture-cases/index.md
      - AI 系统架构: 12-architecture-cases/ai-system-architecture.md
      - ADR 设计决策: 12-architecture-cases/adr.md
      - 故障与经验: 12-architecture-cases/failure-cases.md
  - AI 可读知识层:
      - 13-ai-indexing/index.md
  - 模板:
      - 99-templates/knowledge-note.md
      - 99-templates/adr.md
      - 99-templates/benchmark-report.md
