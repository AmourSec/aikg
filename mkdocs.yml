site_name: AI Knowledge Graph
site_description: AI research and systems knowledge base for graduate students and AI agents
site_url: https://amoursec.github.io/aikg/
repo_url: https://github.com/AmourSec/aikg
repo_name: AmourSec/aikg
extra_css:
  - assets/stylesheets/extra.css
theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: blue
plugins:
  - search:
      lang:
        - en
        - zh
  - mermaid2:
      javascript: assets/javascripts/mermaid.min.js
      arguments:
        startOnLoad: true
        securityLevel: loose
        flowchart:
          useMaxWidth: true
          htmlLabels: true
          nodeSpacing: 28
          rankSpacing: 42
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - 首页: index.md
  - 知识地图: knowledge-map.md
  - 数学与机器学习基础:
      - 01-ai-basics/index.md
  - 模型架构与任务范式:
      - 02-models-and-tasks/index.md
  - 数据集、标注与基准:
      - 03-data-engineering/index.md
  - 训练算法、微调与对齐:
      - 04-training-finetuning-alignment/index.md
  - 推理算法与高效服务:
      - 05-inference-apps/index.md
  - 检索增强、工具使用与智能体:
      - 06-prompt-rag-agents/index.md
  - 框架、编译器与运行时:
      - 07-ai-software-stack/index.md
  - AI 计算架构与硬件基础:
      - 08-ai-compute-infra/index.md
  - 分布式系统与实验平台:
      - 09-systems-mlops/index.md
  - 评测、复现与性能分析:
      - 10-evaluation-benchmark-optimization/index.md
  - 可信、安全与 AI 治理:
      - 11-safety-governance/index.md
  - 论文复现、研究案例与决策记录:
      - 12-architecture-cases/index.md
      - AI 系统论文与架构: 12-architecture-cases/ai-system-architecture.md
      - 研究决策记录: 12-architecture-cases/adr.md
      - 实验故障与复盘: 12-architecture-cases/failure-cases.md
  - 知识组织与研究工作流:
      - 13-ai-indexing/index.md
  - 模板:
      - 知识点模板: 99-templates/knowledge-note.md
      - 研究决策模板: 99-templates/adr.md
      - 基准实验报告模板: 99-templates/benchmark-report.md
