site_name: AI Knowledge Graph
site_description: AI infrastructure and efficient computing knowledge base for systems researchers and AI agents
site_url: https://amoursec.github.io/aikg/
repo_url: https://github.com/AmourSec/aikg
repo_name: AmourSec/aikg
dev_addr: 127.0.0.1:8801
extra_css:
  - assets/stylesheets/extra.css
theme:
  name: material
  language: zh
  features:
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: blue
plugins:
  - search:
      lang:
        - en
        - zh
  - mermaid2:
      javascript: assets/javascripts/mermaid.min.js
      arguments:
        startOnLoad: true
        securityLevel: loose
        flowchart:
          useMaxWidth: true
          htmlLabels: true
          nodeSpacing: 28
          rankSpacing: 42
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
